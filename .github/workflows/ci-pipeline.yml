name: CI Pipeline

on:
  push: 
    branches: ["main","develop"]
  pull_request:
    branches: ["main","develop"]
  workflow_dispatch: 
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: true
      version:
        description: "Application version"
        required: true

        
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check_out
      - uses: actions/checkout@v3
      - name: Print branch name
        run: echo "Running CI on branch ${{ github.ref }}"


name: deploy-app
on:
  push:
    branches:
      - feature-deploy
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checks out code
        uses: actions/checkout@v3
      - name: Sets up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Installs dependencies
        run: npm install
      - name: Runs test script from package.json
        run: npm test
